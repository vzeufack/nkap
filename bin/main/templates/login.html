<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Login</title>
		<div th:replace="fragments/header :: css"></div>
		<link rel="stylesheet" href="/css/authentication.css"/>
	</head>
	<body>
		<div class="container">
		 	<div class="card mx-auto">
			  <div class="card-header bree-serif">
			  	<h2>Welcome to Nkap <i class='fas fa-coins'></i></h2>
			  	<h5>Your personal budgeting assitant</h5>
			  </div>
			  <div class="card-body">
				 <form th:action="@{/login}" th:object="${appUserDTO}" method="POST">
			        <div th:if="${param.logout != null}">
			           You have been logged out.
			        </div>
			        <div class = "form-group">
				        <label for="email">Email</label>
				        <input type="text" class="form-control" th:field="${appUserDTO.email}"/>
					</div>
			        <div class = "form-group">
				        <label for="password">Password</label>
				        <input type="password" class="form-control" th:field="${appUserDTO.password}"/>
			        </div>
					<div th:if = "${param.error != null}" class="alert alert-danger">
			            Invalid email or password!
			        </div>
			        <div class = "form-bottom">
			            <button type="submit" class="btn btn-primary">Login</button>
			            <p id="register-link">Don't have an account? <a href="/register">Register</a></p>
			        </div>
				 </form>
			  </div>	  
		 	</div>
		</div>
		<div th:replace="fragments/header.html :: scripts"></div>
	</body>
</html>
