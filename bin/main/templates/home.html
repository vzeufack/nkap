<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <title>nkap – Budget</title>
    <th:block th:replace="~{fragments/header :: css}"></th:block>
    <link rel="stylesheet" href="/css/budget.css"/>
</head>
<body>

<div class="container-fluid p-0 page-wrapper">

    <div class="row no-gutters header-bar align-items-center">

        <div class="col-3 logo-col d-flex align-items-center justify-content-center">
            <span class="bree-serif nkap-logo">
                <i class="fas fa-wallet"></i> nkap
            </span>
        </div>

        <div class="col-6 month-col d-flex align-items-center justify-content-center">
            <div class="month-nav-wrap d-flex align-items-center"
                th:data-month="${currentMonthValue}"
                th:data-year="${currentYearValue}">
                <button class="btn btn-month-nav" id="btnPrevMonth" title="Previous month">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="input-group month-picker-group mx-2">
                    <div class="input-group-prepend">
                        <span class="input-group-text"><i class="fas fa-calendar-alt"></i></span>
                    </div>
                    <input type="text"
                           id="monthPicker"
                           class="form-control month-input"
                           placeholder="April 2025"
                           th:value="${currentMonth ?: ''}"
                           readonly/>
                </div>
                <button class="btn btn-month-nav" id="btnNextMonth" title="Next month">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <button class="btn btn-month-today ml-2" id="btnToday" title="Go to current month">
                    Today
                </button>
            </div>
        </div>

        <div class="col-3 actions-col d-flex align-items-center justify-content-center">
            <button class="btn btn-header btn-primary-nkap mr-2" title="Add Transaction">
                <i class="fas fa-plus mr-1"></i> Add Transaction
            </button>
            <button class="btn btn-header btn-outline-nkap mr-2" title="Bulk Upload">
                <i class="fas fa-upload mr-1"></i> Bulk Upload
            </button>
            <button class="btn btn-header btn-outline-nkap" title="Download Template">
                <i class="fas fa-file-download mr-1"></i> Template
            </button>
        </div>

    </div>

    <div class="row no-gutters content-row">

        <div class="col-3 sidebar d-flex flex-column">

            <div class="sidebar-section sidebar-nav-section">
                <ul class="nav flex-column sidebar-nav">
                    <li class="nav-item">
                        <a class="nav-link sidebar-link active" href="/budget">
                            <i class="fas fa-th-large nav-icon"></i>
                            <span>Budget</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link sidebar-link" href="/reports">
                            <i class="fas fa-chart-bar nav-icon"></i>
                            <span>Reports</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link sidebar-link" href="/transactions">
                            <i class="fas fa-exchange-alt nav-icon"></i>
                            <span>Transactions</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="sidebar-section sidebar-accounts-section flex-grow-1">
                <div class="sidebar-section-header">
                    <span>Accounts</span>
                    <button class="btn-icon" title="Add account"><i class="fas fa-plus-circle"></i></button>
                </div>

                <div class="account-list">
                    <div class="account-item" th:each="account : ${accounts}">
                        <div class="account-icon"><i class="fas fa-university"></i></div>
                        <div class="account-info">
                            <span class="account-name" th:text="${account.name}">Checking</span>
                            <span class="account-balance"
                                  th:text="${'$' + #numbers.formatDecimal(account.balance, 1, 2)}">$0.00</span>
                        </div>
                    </div>
                    <div class="account-item" th:if="${#lists.isEmpty(accounts)}">
                        <div class="account-icon"><i class="fas fa-university"></i></div>
                        <div class="account-info">
                            <span class="account-name">Checking</span>
                            <span class="account-balance">$2,400.00</span>
                        </div>
                    </div>
                    <div class="account-item" th:if="${#lists.isEmpty(accounts)}">
                        <div class="account-icon savings-icon"><i class="fas fa-piggy-bank"></i></div>
                        <div class="account-info">
                            <span class="account-name">Savings</span>
                            <span class="account-balance">$8,150.00</span>
                        </div>
                    </div>
                    <div class="account-item" th:if="${#lists.isEmpty(accounts)}">
                        <div class="account-icon credit-icon"><i class="fas fa-credit-card"></i></div>
                        <div class="account-info">
                            <span class="account-name">Credit Card</span>
                            <span class="account-balance negative">-$320.00</span>
                        </div>
                    </div>
                </div>

                <div class="accounts-total">
                    <span class="total-label">Net Worth</span>
                    <span class="total-amount bree-serif"
                          th:text="${'$' + #numbers.formatDecimal(netWorth ?: 10230, 1, 2)}">$10,230.00</span>
                </div>
            </div>

            <div class="sidebar-section sidebar-user-section">
                <div class="user-info">
                    <i class="fas fa-user-circle user-avatar-icon"></i>
                    <span class="user-email" th:text="${appUser?.email ?: 'user@email.com'}">user@email.com</span>
                </div>
                <a href="/logout" class="btn btn-logout" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>

        </div>

        <div id="budget-plan-container" class="col-9 d-flex p-0" style="height: 100%;">
            <th:block th:replace="~{fragments/budget-plan :: budget-plan}"></th:block>
        </div>

    </div>

</div>

<th:block th:replace="~{fragments/header :: scripts}"></th:block>
<script src="/js/budget.js"></script>

<!-- ══ Add / Edit Group Modal ══ -->
<div class="modal fade" id="addGroupModal" tabindex="-1" role="dialog"
     aria-labelledby="groupModalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content nkap-modal">
            <div class="modal-header nkap-modal-header">
                <div class="modal-title-wrap">
                    <div class="modal-icon-circle">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <h5 class="modal-title bree-serif" id="groupModalTitle">New Group</h5>
                </div>
                <button type="button" class="close nkap-modal-close" data-dismiss="modal" aria-label="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body nkap-modal-body">
                <p class="modal-description text-muted" id="groupModalDesc">Give this group a name.
                    You can organise your budget items by category — Housing, Food, Transport, etc.</p>
                <div class="form-group mb-0">
                    <label class="nkap-input-label" for="groupNameInput">Group Name</label>
                    <input type="text" id="groupNameInput" class="form-control nkap-input"
                           placeholder="e.g. Housing, Food, Transport…" maxlength="64" autocomplete="off"/>
                    <div class="invalid-feedback" id="groupNameError"></div>
                </div>
            </div>
            <div class="modal-footer nkap-modal-footer">
                <button type="button" class="btn btn-modal-cancel" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-modal-save" id="btnSaveGroup" onclick="saveGroup()">
                    <span id="btnSaveGroupSpinner" class="spinner-border spinner-border-sm mr-2 d-none" role="status"></span>
                    <i class="fas fa-check mr-2" id="btnSaveGroupIcon"></i>
                    <span id="groupModalSaveLabel">Save Group</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ══ Add Category Modal ══ -->
<div class="modal fade" id="addCategoryModal" tabindex="-1" role="dialog"
     aria-labelledby="categoryModalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content nkap-modal">
            <div class="modal-header nkap-modal-header">
                <div class="modal-title-wrap">
                    <div class="modal-icon-circle">
                        <i class="fas fa-tag"></i>
                    </div>
                    <div>
                        <h5 class="modal-title bree-serif" id="categoryModalTitle">New Category</h5>
                        <!-- Shows which group this category belongs to -->
                        <span class="modal-group-label text-muted" id="categoryGroupLabel"></span>
                    </div>
                </div>
                <button type="button" class="close nkap-modal-close" data-dismiss="modal" aria-label="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body nkap-modal-body">
                <div class="form-group mb-3">
                    <label class="nkap-input-label" for="categoryNameInput">Category Name</label>
                    <input type="text" id="categoryNameInput" class="form-control nkap-input"
                           placeholder="e.g. Rent, Groceries, Netflix…" maxlength="100" autocomplete="off"/>
                    <div class="invalid-feedback" id="categoryNameError"></div>
                </div>
                <div class="form-group mb-3">
                    <label class="nkap-input-label" for="categoryAllocationInput">Allocated Amount</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text nkap-input-prefix">$</span>
                        </div>
                        <input type="number" id="categoryAllocationInput" class="form-control nkap-input"
                               placeholder="0.00" min="0" step="0.01" autocomplete="off"/>
                    </div>
                    <div class="invalid-feedback d-block" id="categoryAllocationError"></div>
                </div>
                <div class="form-group mb-0">
                    <label class="nkap-input-label" for="categoryBalanceInput">Current Balance</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text nkap-input-prefix">$</span>
                        </div>
                        <input type="number" id="categoryBalanceInput" class="form-control nkap-input"
                               placeholder="0.00" min="0" step="0.01" autocomplete="off"/>
                    </div>
                    <div class="invalid-feedback d-block" id="categoryBalanceError"></div>
                </div>
            </div>
            <div class="modal-footer nkap-modal-footer">
                <button type="button" class="btn btn-modal-cancel" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-modal-save" id="btnSaveCategory" onclick="saveCategory()">
                    <span id="btnSaveCategorySpinner" class="spinner-border spinner-border-sm mr-2 d-none" role="status"></span>
                    <i class="fas fa-check mr-2" id="btnSaveCategoryIcon"></i>
                    <span id="categoryModalSaveLabel">Save Category</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal event bindings — once here, never re-registered on fragment swaps -->
<script>
    $('#addGroupModal').on('shown.bs.modal', function() {
        document.getElementById('groupNameInput').focus();
    });

    $('#addCategoryModal').on('shown.bs.modal', function() {
        document.getElementById('categoryNameInput').focus();
    });

    document.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;
        var active = document.activeElement;
        if (!active) return;
        if (active.id === 'groupNameInput')        saveGroup();
        if (active.id === 'categoryNameInput'    ||
            active.id === 'categoryAllocationInput' ||
            active.id === 'categoryBalanceInput')    saveCategory();
    });
</script>

</body>
</html>
